<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:#f7f3ee;color:#2a2420;}

/* バナー */
.banner{background:#0f0d0b;overflow:hidden;}
.banner svg{display:block;width:100%;}


/* 検索バー */
.toolbar{background:#ede8e0;border-bottom:1px solid #d4cfc8;padding:10px 16px;display:flex;gap:8px;align-items:center;}
.search-wrap{display:flex;align-items:center;background:#faf7f3;border:0.5px solid #c8c0b8;border-radius:6px;padding:0 10px;flex:1;}
.search-wrap svg{width:14px;height:14px;stroke:#bbb;fill:none;flex-shrink:0;margin-right:6px;}
.search-wrap input{border:none;background:transparent;font-family:'Noto Sans JP',sans-serif;font-size:13px;color:#2a2420;outline:none;padding:8px 0;width:100%;}
.search-wrap input::placeholder{color:#bbb;}
.result-count{font-size:11px;color:#aaa;white-space:nowrap;}
.filter-btn{font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:7px 12px;border-radius:6px;border:0.5px solid #c8c0b8;background:#faf7f3;color:#4a4540;cursor:pointer;transition:all 0.15s;white-space:nowrap;}
.filter-btn.on{background:#1a1612;color:#f0ebe3;border-color:#1a1612;}

/* レイアウト */
.layout{display:flex;height:calc(100vh - 260px);min-height:480px;}

/* 左カラム */
.left{width:210px;min-width:210px;overflow-y:auto;background:#faf7f3;border-right:1px solid #ddd8d0;flex-shrink:0;}
.vtxt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.left::-webkit-scrollbar{width:3px;}
.left::-webkit-scrollbar-thumb{background:#c8c0b8;}
.sec-label{padding:6px 14px 4px;font-size:10px;color:#b8965a;letter-spacing:0.12em;background:#f4efe8;border-bottom:0.5px solid #e8e0d8;border-top:0.5px solid #e8e0d8;}
.verse{padding:9px 14px;cursor:pointer;border-bottom:0.5px solid #ede8e0;display:flex;align-items:center;gap:8px;transition:background 0.12s;}
.verse:hover{background:#f0ebe3;}
.verse.active{background:#1a1612;}
.verse.no-vid{opacity:0.28;cursor:default;}
.vnum{font-size:10px;color:#bbb;min-width:18px;flex-shrink:0;}
.verse.active .vnum{color:#b8965a;}
.vtxt{font-family:'Noto Serif JP',serif;font-size:12px;color:#2a2420;flex:1;line-height:1.4;}
.verse.active .vtxt{color:#f0ebe3;}
.no-result-list{padding:20px;text-align:center;font-size:13px;color:#bbb;}

/* 右カラム */
.right{flex:1;overflow-y:auto;background:#f7f3ee;display:flex;flex-direction:column;}
.right::-webkit-scrollbar{width:3px;}
.right::-webkit-scrollbar-thumb{background:#c8c0b8;}
.hint{text-align:center;padding:60px 20px;color:#bbb;font-size:13px;line-height:2.2;flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
.hint-arrow{font-size:20px;color:#ddd8d0;}
.r-inner{padding:18px 20px;flex:1;}
.r-head{margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #ddd8d0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.r-head-left .line-text{font-family:'Noto Serif JP',serif;font-size:18px;color:#1a1612;letter-spacing:0.1em;}
.r-head-left .vcount{font-size:11px;color:#aaa;margin-top:4px;letter-spacing:0.05em;}

/* 動画カード PC版：横並びカード */
.video-grid{display:flex;flex-direction:column;gap:10px;}
.vcard{display:flex;align-items:center;border:0.5px solid #ddd8d0;border-radius:8px;overflow:hidden;text-decoration:none;transition:all 0.15s;background:#faf7f3;}
.vcard:hover{border-color:#b8965a;background:#fff;}
.thumb-wrap{width:200px;min-width:200px;aspect-ratio:16/9;background:#111;overflow:hidden;flex-shrink:0;}
.thumb-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.vinfo{padding:12px 16px;flex:1;}
.vtitle{font-size:13px;color:#2a2420;line-height:1.5;}
.vlink{font-size:11px;color:#b8965a;margin-top:4px;display:block;}

/* ナビバー */
.nav-bar{padding:12px 20px;border-top:1px solid #ddd8d0;display:flex;gap:8px;background:#faf7f3;flex-shrink:0;}
.nav-btn{font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:8px 14px;border-radius:6px;border:0.5px solid #c8c0b8;background:#fff;color:#4a4540;cursor:pointer;flex:1;transition:all 0.15s;letter-spacing:0.03em;}
.nav-btn:hover{background:#f0ebe3;border-color:#aaa;}
.nav-btn:disabled{opacity:0.25;cursor:default;}
.nav-btn.next{text-align:right;}

/* タブレット */
@media(max-width:768px){
  .left{width:150px;min-width:150px;}
  .vtxt{font-size:11px;}
  .r-inner{padding:14px 14px;}
  .nav-btn{font-size:11px;padding:7px 8px;}
  .toolbar{flex-wrap:wrap;}
  .r-head{flex-direction:column;gap:8px;}
  .thumb-wrap{width:140px;min-width:140px;}
  .vtitle{font-size:12px;}
  .vlink{display:none;}
}
/* スマホ */
@media(max-width:480px){
  .left{width:110px;min-width:110px;}
  .verse{padding:8px 8px;}
  .vtxt{font-size:10px;}
  .r-inner{padding:12px 12px;}
  .nav-btn{font-size:10px;padding:6px 6px;}
  .video-grid{display:flex;flex-direction:column;gap:8px;}
  .vcard{flex-direction:column;}
  .thumb-wrap{width:100%;min-width:unset;}
  .vinfo{display:none;}
}
</style>
</head>

// 行番号→動画リスト のマップを構築
const videoMap = {};
rawVideos.forEach(v => {
  v.lines.forEach(l => {
    if (!videoMap[l]) videoMap[l] = [];
    videoMap[l].push(v);
  });
});

let activeId = null;
let filtered = verses;

function hasVid(id) { return !!videoMap[id]; }


function applyFilter() {
  const q = document.getElementById('searchInput').value.trim();
  const rc = document.getElementById('resultCount');
  filtered = verses.filter(v => {
    if (q) {
      if (/^\d+$/.test(q)) { if (v.id !== parseInt(q)) return false; }
      else { if (!v.text.includes(q)) return false; }
    }
    if (filterDone && !done.has(v.id)) return false;
    return true;
  });
  rc.textContent = q ? filtered.length + '件' : '';
  renderList();
  if (filtered.length === 1 && hasVid(filtered[0].id)) selectVerse(filtered[0].id);
}

function renderList() {
  const list = document.getElementById('verseList');
  list.innerHTML = '';
  if (filtered.length === 0) {
    list.innerHTML = '<div class="no-result-list">該当なし</div>';
    return;
  }
  filtered.forEach(v => {
    const el = document.createElement('div');
    el.className = 'verse' + (hasVid(v.id) ? '' : ' no-vid') + (activeId === v.id ? ' active' : '');
    el.dataset.id = v.id;
    el.innerHTML = `<span class="vnum">${v.id}</span><span class="vtxt">${v.text}</span>`;
    if (hasVid(v.id)) el.addEventListener('click', () => selectVerse(v.id));
    list.appendChild(el);
  });
}

function selectVerse(id) {
  activeId = id;
  renderList();
  const v = verses.find(x => x.id === id);
  const vids = videoMap[id] || [];
  const idx = filtered.findIndex(x => x.id === id);
  const prev = filtered.slice(0, idx).reverse().find(x => hasVid(x.id));
  const next = filtered.slice(idx + 1).find(x => hasVid(x.id));

  document.getElementById('rightPane').innerHTML = `
    <div class="r-inner">
      <div class="r-head">
        <div class="r-head-left">
          <div class="line-text">${v.text}</div>
          <div class="vcount">${vids.length}本　第${v.id}行</div>
        </div>
      </div>
      <div class="video-grid">${vids.map(vi => `<a class="vcard" href="${vi.u}" target="_blank" rel="noopener"><div class="thumb-wrap"><img src="https://img.youtube.com/vi/${vi.id}/mqdefault.jpg" alt="${vi.t}" loading="lazy"></div><div class="vinfo"><div class="vtitle">${vi.t}</div><div class="vlink">YouTube で見る →</div></div></a>`).join('')}</div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn" onclick="selectVerse(${prev ? prev.id : 0})" ${!prev ? 'disabled' : ''}>← ${prev ? prev.text : 'なし'}</button>
      <button class="nav-btn next" onclick="selectVerse(${next ? next.id : 0})" ${!next ? 'disabled' : ''}>${next ? next.text : 'なし'} →</button>
    </div>
  `;
  const el = document.querySelector(`.verse[data-id="${id}"]`);
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}


document.getElementById('searchInput').addEventListener('input', applyFilter);
renderList();
